# .github/workflows/container-scan.yml
# Container image vulnerability scanning workflow
#
# Builds Docker images and scans them for vulnerabilities using Trivy
# Results are uploaded to GitHub Security tab (SARIF)
#
# Runs on: Push/PR when Dockerfile or context files change

name: Container Scan

on:
  push:
    branches: [main]
    paths:
      - 'proxy/**'
      - 'certbot/**'
  pull_request:
    branches: [main]
    paths:
      - 'proxy/**'
      - 'certbot/**'
  schedule:
    # Weekly scan to catch new CVEs in base images
    - cron: '0 1 * * 0'
  workflow_dispatch:
    # Allow manual trigger

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  # ===========================================================================
  # Build and Scan Container Images
  # ===========================================================================
  build-and-scan:
    name: Build & Scan ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - context: proxy
            dockerfile: proxy/Dockerfile
            image: vntyper-proxy
          - context: certbot
            dockerfile: certbot/Dockerfile
            image: vntyper-certbot

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build ${{ matrix.image }} image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.image }}:scan
          # Use GitHub Actions cache for faster builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: '${{ matrix.image }}:scan'
          format: 'sarif'
          output: 'trivy-${{ matrix.image }}-results.sarif'
          severity: 'CRITICAL,HIGH'
          # Ignore unfixed vulnerabilities (no patch available)
          ignore-unfixed: true
          # Exit 0 to allow SARIF upload
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v3
        with:
          sarif_file: 'trivy-${{ matrix.image }}-results.sarif'
          category: 'container-${{ matrix.image }}'
        continue-on-error: true

      - name: Run Trivy (table output for PR comments)
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: '${{ matrix.image }}:scan'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'
        # Don't fail the job, just report findings
        continue-on-error: true
